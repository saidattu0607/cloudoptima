<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOptima - Cloud Cost Optimization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366F1;
            --secondary: #818CF8;
            --bg: #0B1120;
            --surface: #1E293B;
            --surface-hover: #334155;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --accent: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #D946EF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--text-main);
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 2rem;
            flex-grow: 1;
        }
        
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            font-size: 0.95rem;
        }
        .btn:hover {
            background: var(--secondary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        .btn-accent {
            background: var(--accent);
            color: #000;
        }
        .btn-accent:hover {
            background: #34D399;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        .flash-messages {
            margin-bottom: 2rem;
        }
        .flash-message {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .flash-success { background: rgba(16, 185, 129, 0.1); border-color: var(--accent); color: var(--accent); }
        .flash-error { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); }
        
        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        
    </style>
</head>
<body>
    <header>
        <h1>CloudOptima</h1>
        <nav>
            {% if session.get('user_id') %}
                {% if session.get('is_admin') %}
                    <a href="{{ url_for('admin_dashboard') }}" style="color: var(--warning);"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 4px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.83-5.83m0 0l2.67-2.67c.74-.74.19-2.01-.86-2.01H15V4.86c0-1.05-1.27-1.6-2.01-.86l-2.67 2.67m5.83 5.83l-5.83 5.83M4.636 19.364a9 9 0 1112.728-12.728" /></svg>Admin</a>
                {% endif %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('optimizations') }}">Optimizations</a>
                <a href="{{ url_for('reports') }}">Reports</a>
                <a href="{{ url_for('conclusion') }}">Future Config</a>
                <a href="{{ url_for('upload') }}">Upload Data</a>
                <a href="{{ url_for('logout') }}" style="color: var(--danger);">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}" class="btn" style="color: white; padding: 0.5rem 1rem; margin-left: 1rem;">Get Started</a>
            {% endif %}
        </nav>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
